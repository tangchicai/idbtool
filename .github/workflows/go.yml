name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build exe
        run: go build -ldflags="-s -w" -o idbtool.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: idbtool-windows
          path: idbtool.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: idbtool.exe
